<!DOCTYPE HTML>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Representacion de Google</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <nav class="top-nav">
                <a href="#">Gmail</a>
                <a href="#">Imágenes</a>
                <div class="profile-icon">J</div>
            </nav>
        </header>
        <main>
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo" class="logo">

            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Buscar en Google o escribir una URL">
            </div>

            <div class="buttons-container">
                <button id="search-btn">Buscar en Google</button>
                <button>Voy a tener suerte</button>
            </div>
        </main>
        
        <footer>
            <div class="footer-location">México</div>
            <div class="footer-links">
                <div class="left-links">
                    <a href="#">Sobre Google</a>
                    <a href="#">Publicidad</a>
                    <a href="#">Negocios</a>
                    <a href="#">Cómo funciona la búsqueda</a>
                </div>
                <div class="right-links">
                    <a href="#">Privacidad</a>
                    <a href="#">Condiciones</a>
                    <a href="#">Preferencias de cookies</a>
                    <a href="#">Configuración</a>
                </div>
            </div>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
